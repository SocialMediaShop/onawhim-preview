<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Netlify Forms</title>
</head>
<body>
  <!-- Netlify Form Detection (Enquiry Form) -->
  <form name="enquiry" method="POST" data-netlify="true">
    <input type="text" name="name" />
    <input type="email" name="email" />
    <input type="text" name="phone" />
    <input type="text" name="country" />
    <input type="text" name="tourType" />
    <input type="text" name="groupSize" />
    <input type="text" name="travelMonth" />
    <input type="text" name="duration" />
    <textarea name="message"></textarea>
    <input type="text" name="howHeard" />
    <input type="checkbox" name="newsletter" />
  </form>
</body>
</html>
